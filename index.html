<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Débarras Maison & Appartement - Style Universel">
    <meta property="og:description" content="Besoin de vider un logement ? Découvrez nos services de débarras rapide et recyclage.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://raw.githubusercontent.com/M-GARDES/pub-debarras/main/preview.jpg">
    <meta property="og:image" content="preview.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <title>Débarras Style Universel</title>

    <style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* Utilise le beige de l'image pour supprimer le noir sans couper le logo */
        background-color: #e5c09a; 
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .cadre-pub {
        position: relative;
        display: inline-block; /* Force le cadre à serrer l'image */
        max-width: 95vw;
        max-height: 95vh;
    }

    .img-fond {
        display: block;
        max-width: 100%;
        max-height: 95vh;
        width: auto;
        height: auto;
        border-radius: 5px;
    }

    .neon-border {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        /* ÉPAISSEUR : Passage à 10px pour un effet plus large */
        border: 10px solid #00ffff; 
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        /* COULEUR : Remplace #39FF14 par le code de ton choix (ici Vert Néon) */
        box-shadow: 0 0 20px #00FFFF, 0 0 40px #00FFFF, inset 0 0 20px #00FFFF;
        animation: flicker 1s infinite;
    }

    @keyframes flicker {
    0%, 100% { 
        opacity: 0; /* Éteint complètement */
        box-shadow: none;
    }
    50% { 
        opacity: 1; /* Allumé à fond */
        /* N'oublie pas de mettre TA couleur ici (ex: vert #39FF14) */
        box-shadow: 0 0 20px #39FF14, 0 0 40px #39FF14, inset 0 0 20px #39FF14;
    }
}

    .container {
        position: absolute;
        /* POSITION BOUTON : Descendu à 3% pour être tout en bas */
        bottom: 3%; 
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        z-index: 20;
    }

    .btn-animation {
        /* Largeur augmentée (était à 40%, on passe à 55%) */
        width: 55%; 
        min-width: 300px; 
        max-width: 500px; /* Limite pour ne pas que ce soit géant sur PC */
        height: auto;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    /* 3. EFFET DE SURVOL : Adaptation à la nouvelle couleur */
    .btn-animation:hover {
        transform: scale(1.05);
        filter: drop-shadow(0 0 20px #8d08e5);
    }

    
    .btn-animation:hover {
        transform: scale(1.1);
        filter: drop-shadow(0 0 30px #de0876);
    }
</style>
</head>
<body>
    <div class="cadre-pub">
        <!-- L'image de fond n'est plus en background-image mais ici -->
        <img src="fond.jpg" class="img-fond" alt="Débarras Toit">
        
        <div class="neon-border"></div>
        
        <div class="container">
            <a href="https://debarrasse-toit.fr" target="_blank">
                <img src="bouton.png" alt="Visiter le site" class="btn-animation">
            </a>
        </div>
    </div>
</body>
</html>
