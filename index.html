<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Débarras Maison & Appartement - Style Universel">
    <meta property="og:description" content="Besoin de vider un logement ? Découvrez nos services de débarras rapide et recyclage.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://votre-lien-archive-host.com/pub.html">
    <meta property="og:image" content="preview.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <title>Débarras Style Universel</title>

    <style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .cadre-pub {
        position: relative;
        /* Ces 3 lignes forcent le cadre à avoir la taille de l'image réelle */
        width: 100%;
        max-width: calc(100vh * (1056 / 501)); 
        max-height: calc(100vw * (501 / 1056));
        
        aspect-ratio: 1056 / 501; 
        background-image: url('fond.jpg');
        background-repeat: no-repeat;
        background-position: center center;
        background-size: contain;
    }

    .neon-border {
        position: absolute;
        /* Ajuste ces valeurs (0, 2px, ou 5px) pour coller pile au bord beige */
        top: 2px;
        left: 2px;
        right: 2px;
        bottom: 2px;
        border: 4px solid #fff;
        border-radius: 5px;
        pointer-events: none;
        z-index: 10;
        box-shadow: 0 0 15px #fff, 0 0 30px #0077ff, inset 0 0 15px #0077ff;
        animation: flicker 2s infinite;
    }

    @keyframes flicker {
        0%, 18%, 22%, 25%, 53%, 57%, 100% {
            opacity: 1;
            box-shadow: 0 0 15px #fff, 0 0 30px #0077ff, inset 0 0 15px #0077ff;
        }
        20%, 24%, 55% {
            opacity: 0.4;
            box-shadow: none;
        }
    }

    .container {
        position: absolute;
        bottom: 10%; /* Ajuste ce % pour monter ou descendre le bouton */
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        z-index: 20;
    }

    .btn-animation {
        width: 60%; /* Taille proportionnelle au cadre */
        min-width: 250px;
        height: auto;
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
    }

    .btn-animation:hover {
        transform: scale(1.4);
        filter: brightness(1.4) drop-shadow(0px 0px 25px #0077ff);
    }
</style>
</head>
<body>
    <!-- On crée un cadre qui a la taille de l'image -->
    <div class="cadre-pub">
        <div class="neon-border"></div>
        <div class="container">
            <a href="https://debarrasse-toit.fr" target="_blank">
                <img src="bouton.png" alt="Visiter le site" class="btn-animation">
            </a>
        </div>
    </div>
</body>
</html>
