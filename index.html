<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Débarras Maison & Appartement - Style Universel">
    <meta property="og:description" content="Besoin de vider un logement ? Découvrez nos services de débarras rapide et recyclage.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://votre-lien-archive-host.com/pub.html">
    <meta property="og:image" content="preview.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <title>Débarras Style Universel</title>

    <style>
    body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* On supprime le flex qui centrait le cadre pour laisser l'image remplir tout */
        overflow: hidden;
    }

    .cadre-pub {
        position: relative;
        width: 100vw;
        height: 100vh;
        /* "cover" au lieu de "contain" : l'image remplit tout l'écran sans laisser de noir */
        background-image: url('fond.jpg');
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover; 
    }

    .neon-border {
        position: absolute;
        /* Le néon se colle maintenant aux bords de l'écran */
        top: 15px;
        left: 15px;
        right: 15px;
        bottom: 15px;
        border: 4px solid #fff;
        border-radius: 10px;
        pointer-events: none;
        z-index: 10;
        box-shadow: 0 0 15px #fff, 0 0 30px #0077ff, inset 0 0 15px #0077ff;
        animation: flicker 2s infinite;
    }

    @keyframes flicker {
        0%, 18%, 22%, 25%, 53%, 57%, 100% {
            opacity: 1;
            box-shadow: 0 0 15px #fff, 0 0 30px #0077ff, inset 0 0 15px #0077ff;
        }
        20%, 24%, 55% {
            opacity: 0.4;
            box-shadow: none;
        }
    }

    .container {
        position: absolute;
        /* On place le bouton par rapport au bas de l'écran */
        bottom: 80px; 
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        z-index: 20;
    }

    .btn-animation {
        width: 450px;
        max-width: 80%;
        height: auto;
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
    }

    .btn-animation:hover {
        transform: scale(1.1);
        filter: brightness(1.2) drop-shadow(0px 0px 25px #0077ff);
    }
</style>
</head>
<body>
    <!-- On crée un cadre qui a la taille de l'image -->
    <div class="cadre-pub">
        <div class="neon-border"></div>
        <div class="container">
            <a href="https://debarrasse-toit.fr" target="_blank">
                <img src="bouton.png" alt="Visiter le site" class="btn-animation">
            </a>
        </div>
    </div>
</body>
</html>
